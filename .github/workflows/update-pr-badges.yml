name: Update PR Badges

on:
  schedule:
    # Run every hour during weekday active hours (Mon-Fri, 7am-6pm EST = 12:00-22:00 UTC)
    - cron: '0 12-22 * * 1-5'
    # Run every 6 hours on weekends (less frequent)
    - cron: '0 */6 * * 0,6'
    # Run less frequently during weekday off-hours (after 6pm EST = 23:00 UTC, and before 7am EST = 12:00 UTC)
    - cron: '0 0,6,23 * * 1-5'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-pr-badges.yml'
      - '.github/scripts/update-pr-list.sh'

permissions:
  contents: write
  pull-requests: read

jobs:
  update-pr-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update PR list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/update-pr-list.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MY_PULL_REQUESTS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PR list with latest status"
            git push
          fi
