name: Update PR Badges

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-pr-badges.yml'
      - '.github/scripts/update-pr-list.sh'

permissions:
  contents: write
  pull-requests: read

jobs:
  update-pr-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update PR list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/update-pr-list.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MY_PULL_REQUESTS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PR list with latest status"
            git push
          fi
