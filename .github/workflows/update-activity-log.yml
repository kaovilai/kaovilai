name: Update Activity Log

on:
  schedule:
    # Run every Monday at 5am EST (10:00 UTC)
    - cron: '0 10 * * 1'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-activity-log.yml'
      - '.github/scripts/update-activity-log.sh'

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  update-activity-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate activity log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/update-activity-log.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MY_ACTIVITY.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update activity log for past two weeks"
            git push
          fi
